name: Daily Naver search volumes

# 네이버 검색량만 GitHub Actions에서 자동 실행.
# 쿠팡 랭킹은 Akamai가 GitHub IP를 차단해서 동작하지 않으므로
# 로컬에서 별도 실행 필요 (scripts/README.md 참고).

on:
  schedule:
    # 매일 KST 오전 3시 = UTC 18:00 (전날)
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  naver:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Naver search volume bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          NAVER_ACCESS_LICENSE: ${{ secrets.NAVER_ACCESS_LICENSE }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
        run: node scripts/naver-volume.mjs
